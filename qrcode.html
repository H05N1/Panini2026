<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code — CollectoFoot 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:#0a1628;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.card{background:#fff;border-radius:24px;padding:40px;text-align:center;max-width:340px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.4);}
#qrcode{display:flex;justify-content:center;margin-bottom:24px;}
#qrcode img, #qrcode canvas{border-radius:8px;}
.logo{font-family:'Arial Black',Impact,sans-serif;font-size:22px;color:#0a1628;font-weight:900;margin-bottom:4px;}
.logo span{color:#1a6eb5;}
.sub{font-size:13px;color:#666;margin-bottom:24px;letter-spacing:.05em;}
.url{font-size:11px;color:#999;word-break:break-all;border-top:1px solid #eee;padding-top:16px;margin-top:8px;}
.print-btn{margin-top:20px;background:#1a6eb5;color:#fff;border:none;padding:12px 28px;border-radius:99px;font-size:14px;cursor:pointer;font-weight:600;}
@media print{.print-btn{display:none}body{background:#fff}}</style>
</head>
<body>
<div class="card">
  <div id="qrcode"></div>
  <div class="logo">Collecto<span>Foot</span> 2026</div>
  <div class="sub">Scanne pour gérer ta collection ⚽</div>
  <div class="url">mondial-panini-2026.web.app</div>
  <a href="https://mondial-panini-2026.web.app" style="display:inline-block;margin-top:16px;background:#1a6eb5;color:#fff;text-decoration:none;padding:12px 28px;border-radius:99px;font-size:14px;font-weight:600;">🚀 Ouvrir l'app</a>
  <button class="print-btn" onclick="window.print()">🖨️ Imprimer</button>
</div>
<script>
new QRCode(document.getElementById("qrcode"), {
  text: "https://mondial-panini-2026.web.app",
  width: 220,
  height: 220,
  colorDark: "#0a1628",
  colorLight: "#ffffff",
  correctLevel: QRCode.CorrectLevel.H
});
</script>
</body>
</html>
